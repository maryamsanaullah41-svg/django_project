{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h2 class="text-primary mb-4 text-center">Edit Profile Details</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label fw-bold">Username</label>
                        <input type="text" class="form-control" id="username" name="username" value="{{ profile.username }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ profile.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="bio" class="form-label fw-bold">Biography</label>
                        <textarea class="form-control" id="bio" name="bio" rows="3" required>{{ profile.bio }}</textarea>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning rounded-pill text-white fw-bold">Update Profile</button>
                        <a href="{% url 'home_view' %}" class="btn btn-secondary rounded-pill">Cancel</a>
                    </div>
                </form>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
