{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maryam's Django Project</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        .navbar-brand { font-weight: 800; letter-spacing: 1px; }
        footer { background-color: #212529; color: #6c757d; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container justify-content-center">
            <a class="navbar-brand text-uppercase" href="{% url 'home_view' %}">Maryam's Project Navigation</a>
        </div>
    </nav>

    <main style="min-height: 80vh;">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 - All Rights Reserved</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
