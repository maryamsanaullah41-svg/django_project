{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4 text-center border-danger-subtle">
                <h3 class="text-danger mb-3 fw-bold">Are you sure?</h3>
                <p class="text-muted">Do you really want to delete the profile of <strong class="text-dark">{{ profile.username|capfirst }}</strong>?</p>
                <p class="small text-danger">⚠️ This action cannot be undone!</p>
                
                <form method="POST" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger rounded-pill px-4 me-2 shadow-sm">Yes, Delete</button>
                    <a href="{% url 'home_view' %}" class="btn btn-secondary rounded-pill px-4 shadow-sm">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
